<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Anime Sakura Calculator 🌸 計算機</title>
    
    <!-- Bootstrap 5 CDN -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    
    <!-- Font modern Google (Nunito) -->
    <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800&display=swap" rel="stylesheet">
    
    <!-- External CSS -->
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>

<body>

    <!-- NAVBAR PILL ANIME -->
    <div class="container">
        <nav class="navbar navbar-expand-lg navbar-pill mx-auto mb-5 d-flex justify-content-between align-items-center">
            <a class="navbar-brand text-accent fw-bold" href="/">
                🌸 桜 <span class="text-main">Calc</span>
            </a>
            
            <button class="navbar-toggler border-0" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav" aria-controls="navbarNav" aria-expanded="false" aria-label="Toggle navigation">
                <span class="navbar-toggler-icon"></span>
            </button>
            
            <div class="collapse navbar-collapse justify-content-end" id="navbarNav">
                <ul class="navbar-nav gap-2">
                    <li class="nav-item"><a class="nav-link anime-link" href="{{ url_for('main_bp.index') }}">ホーム Beranda</a></li>
                    <li class="nav-item"><a class="nav-link anime-link" href="{{ url_for('aritmatika_bp.aritmatika') }}">算術 Aritmatika</a></li>
                    <li class="nav-item"><a class="nav-link anime-link" href="{{ url_for('logika_bp.logika') }}">論理 Logika</a></li>
                    <li class="nav-item"><a class="nav-link anime-link" href="{{ url_for('konversi_bp.konversi') }}">変換 Konversi</a></li>
                    <li class="nav-item"><a class="nav-link anime-link" href="{{ url_for('bonus_bp.bonus') }}">🎁 Bonus</a></li>
                    <li class="nav-item"><a class="nav-link anime-link" href="{{ url_for('main_bp.riwayat') }}">履歴 Riwayat</a></li>
                </ul>
            </div>
        </nav>
    </div>

    <!-- KONTEN UTAMA (BLOCK JINJA) -->
    <div class="container mb-5">
        {% block content %}{% endblock %}
    </div>

    <!-- Footer Lembut -->
    <div class="container text-center mt-5 py-4">
        <small class="text-main opacity-75 fw-bold">✨ Anime Sakura UI/UX Design • 作られた愛を込めて (Dibuat dengan cinta) 🌸</small>
    </div>

    <!-- Bootstrap Script JS -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    
    <!-- Script Custom JS -->
    <script src="{{ url_for('static', filename='script.js') }}"></script>
</body>
</html>
