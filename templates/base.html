<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kalkulator Canggih Neon</title>
    
    <!-- Bootstrap 5 CDN (Wajib) -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    
    <!-- Font modern Google -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&display=swap" rel="stylesheet">
    
    <!-- External CSS Kita Sendiri -->
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>

<body class="dark-mode" id="tema-tubuh">

    <!-- NAVBAR SEDERHANA -->
    <nav class="navbar navbar-expand-lg nav-transparent mb-4">
        <div class="container d-flex justify-content-between align-items-center">
            <a class="navbar-brand text-neon fw-bold" href="/">
                <span class="fs-4">🔴 CALCULATOR LAB</span>
            </a>
            
            <div class="collapse navbar-collapse d-flex justify-content-center" id="navbarNav">
                <ul class="navbar-nav">
                    <li class="nav-item"><a class="nav-link text-neon" href="{{ url_for('main_bp.index') }}">Beranda</a></li>
                    <li class="nav-item"><a class="nav-link text-neon" href="{{ url_for('aritmatika_bp.aritmatika') }}">Aritmatika</a></li>
                    <li class="nav-item"><a class="nav-link text-neon" href="{{ url_for('logika_bp.logika') }}">Logika</a></li>
                    <li class="nav-item"><a class="nav-link text-neon" href="{{ url_for('konversi_bp.konversi') }}">Konversi</a></li>
                    <li class="nav-item"><a class="nav-link text-neon" href="{{ url_for('bonus_bp.bonus') }}">Bonus</a></li>
                    <li class="nav-item"><a class="nav-link text-neon" href="{{ url_for('main_bp.riwayat') }}">Riwayat</a></li>
                </ul>
            </div>
            
            <!-- Tombol Toggle Tema -->
            <button class="btn btn-outline-neon" id="tombol-tema" onclick="toggleTheme()">
                ☀️ Light Mode
            </button>
        </div>
    </nav>

    <!-- KONTEN UTAMA (BLOCK JINJA) -->
    <div class="container mb-5">
        {% block content %}{% endblock %}
    </div>

    <!-- Penutup Sederhana -->
    <div class="container text-center mb-4">
        <small class="opacity-50">Tugas Web Flask Mahasiswa - Dibuat dengan 🔴 Neon Merah Dark Mode</small>
    </div>

    <!-- Bootstrap Script JS -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    
    <!-- Script Custom JS Kita -->
    <script src="{{ url_for('static', filename='script.js') }}"></script>
</body>
</html>
