{% extends "base.html" %}

{% block content %}
<div class="mb-4">
    <a href="{{ url_for('main_bp.index') }}" class="text-accent text-decoration-none fw-bold" style="font-size: 1rem;">← 戻る (Kembali)</a>
</div>

<div class="mb-4 text-center">
    <h2 class="text-accent mb-2 fw-bold" style="font-size: 2.5rem;">➗ 算術 (Aritmatika)</h2>
    <p class="text-main opacity-75 fw-semibold" style="font-size: 1.1rem;">Kalkulasi cerdas dengan sentuhan keajaiban Sakura ✨</p>
</div>

<div class="row g-4 justify-content-center">
    <div class="col-lg-8">
        <!-- BENTO PANEL -->
        <div class="card-bento p-5">
            <h4 class="text-accent fw-bold mb-4 text-center border-bottom pb-3" style="border-color: rgba(255, 183, 197, 0.5) !important;">
                🌸 Input Data (入力)
            </h4>
            
            <form action="{{ url_for('aritmatika_bp.aritmatika') }}" method="POST">
                
                <div class="row g-4 mb-4">
                    <div class="col-md-6">
                        <label class="label-teks">Bilangan Pertama</label>
                        <input type="number" step="any" name="angka1" class="form-control input-anime" placeholder="Masukkan angka" required>
                    </div>
                    <div class="col-md-6">
                        <label class="label-teks">Bilangan Kedua <span style="font-size: 0.7rem; opacity:0.6;">(opsional)</span></label>
                        <input type="number" step="any" name="angka2" class="form-control input-anime" placeholder="Masukkan angka">
                    </div>
                </div>

                <label class="label-teks text-center mt-3 mb-3 d-block">Pilih Operasi Sihir ✨</label>
                <div class="row g-2 mb-5">
                    <div class="col-6 col-md-3">
                        <input type="radio" class="btn-check" name="operator" id="op_add" value="+" checked>
                        <label class="btn btn-outline-anime w-100 py-2" for="op_add">+ Tambah</label>
                    </div>
                    <div class="col-6 col-md-3">
                        <input type="radio" class="btn-check" name="operator" id="op_sub" value="-">
                        <label class="btn btn-outline-anime w-100 py-2" for="op_sub">- Kurang</label>
                    </div>
                    <div class="col-6 col-md-3">
                        <input type="radio" class="btn-check" name="operator" id="op_mul" value="x">
                        <label class="btn btn-outline-anime w-100 py-2" for="op_mul">× Kali</label>
                    </div>
                    <div class="col-6 col-md-3">
                        <input type="radio" class="btn-check" name="operator" id="op_div" value="/">
                        <label class="btn btn-outline-anime w-100 py-2" for="op_div">÷ Bagi</label>
                    </div>
                    <div class="col-6 col-md-3">
                        <input type="radio" class="btn-check" name="operator" id="op_pow" value="pangkat">
                        <label class="btn btn-outline-anime w-100 py-2" for="op_pow">Xⁿ Pangkat</label>
                    </div>
                    <div class="col-6 col-md-3">
                        <input type="radio" class="btn-check" name="operator" id="op_sqrt" value="akar">
                        <label class="btn btn-outline-anime w-100 py-2" for="op_sqrt">√ Akar</label>
                    </div>
                    <div class="col-6 col-md-3">
                        <input type="radio" class="btn-check" name="operator" id="op_mod" value="modulus">
                        <label class="btn btn-outline-anime w-100 py-2" for="op_mod">% Modulus</label>
                    </div>
                    <div class="col-6 col-md-3">
                        <input type="radio" class="btn-check" name="operator" id="op_floor" value="floor">
                        <label class="btn btn-outline-anime w-100 py-2" for="op_floor">// Floor Div</label>
                    </div>
                </div>
                
                <button type="submit" class="btn btn-anime w-100 fs-5">
                    計算する (Hitung Sekarang) 🚀
                </button>
            </form>
        </div>
    </div>

    <!-- Output / Riwayat section -->
    <div class="col-lg-4">
        {% include 'output.html' %}
    </div>
</div>
{% endblock %}
